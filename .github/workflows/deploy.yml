name: Deploy
on: [push]
permissions:
  id-token: write
  contents: read
jobs:
  staging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::063257577013:role/hrs-github-actions-deploy
          aws-region: us-east-1
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: STAGE=staging npm run deploy
  staging-cypress:
    runs-on: ubuntu-22.04
    needs: staging
    steps:
      - uses: actions/checkout@v4
      - uses: cypress-io/github-action@v6
        with:
          working-directory: packages/cypress-tests
  prod:
    runs-on: ubuntu-latest
    needs: staging-cypress
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::063257577013:role/hrs-github-actions-deploy
          aws-region: us-east-1
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: STAGE=prod npm run deploy
